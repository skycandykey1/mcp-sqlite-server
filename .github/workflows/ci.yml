name: tests
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements-dev.txt
      - name: Unit tests (read-only safety core)
        run: python -m pytest -q
      - name: Smoke-check the MCP server imports
        run: python -c "import mcp_sqlite.server; print('server import OK')"
